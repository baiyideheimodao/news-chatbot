name: flutter_desktop_chat
description: A desktop Flutter demo with a floating window and chat UI.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.3.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  msix: ^3.16.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/redboy.png

msix_config:
  display_name: 悬浮聊天
  publisher_display_name: Your Company
  identity_name: com.yourcompany.floatingchat
  msix_version: 1.0.0.0
  logo_path: assets/images/redboy.png
  capabilities: internetClient
